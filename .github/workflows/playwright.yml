name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      GMAIL_ACCESS_TOKEN: ${{ secrets.GMAIL_ACCESS_TOKEN }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Verify GMAIL_ACCESS_TOKEN is set
      run: |
        if [ -z "$GMAIL_ACCESS_TOKEN" ]; then
          echo "❌ GMAIL_ACCESS_TOKEN is not set"
          exit 1
        else
          echo "✓ GMAIL_ACCESS_TOKEN is set (length: ${#GMAIL_ACCESS_TOKEN})"
        fi
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
